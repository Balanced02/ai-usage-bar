name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build app bundle
        run: Scripts/build-app.sh

      - name: Zip .app
        run: ditto -c -k --keepParent dist/AIUsageBar.app "dist/AIUsageBar-${GITHUB_REF_NAME}.zip"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "dist/AIUsageBar-${GITHUB_REF_NAME}.zip" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Ad-hoc signed build (no Apple Developer ID yet). On first launch, right-click the app → **Open**, or run \`xattr -dr com.apple.quarantine AIUsageBar.app\`. Then move it to /Applications and enable Launch at login."
